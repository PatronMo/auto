<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GTR Rev Simulator (No Files)</title>
<style>
body {
  background: #000;
  color: white;
  font-family: Arial;
  text-align: center;
  padding-top: 40px;
}

.bar {
  width: 300px;
  height: 20px;
  border: 2px solid white;
  margin: 10px auto;
}

.fill {
  height: 100%;
  width: 0%;
  background: lime;
}

.gear {
  font-size: 50px;
  color: cyan;
}
</style>
</head>
<body>

<h1>🚗 GTR Rev Simulator</h1>
<p>SPACE throttle | Q down | E up | N neutral</p>

<div class="bar"><div id="rpmFill" class="fill"></div></div>

<div>RPM: <span id="rpmText">0</span></div>
<div>Speed: <span id="speedText">0</span></div>
<div class="gear" id="gearText">N</div>

<script>
let rpm = 800;
let speed = 0;
let gear = 0;
let throttle = false;

const maxRPM = 9000;
const gearRatios = [0,2.8,2.0,1.5,1.2,1.0,0.8];

// 🔊 AUDIO ENGINE (no files)
let ctx, osc, gain, filter;

function startAudio() {
  if (ctx) return;

  ctx = new (window.AudioContext || window.webkitAudioContext)();

  osc = ctx.createOscillator();
  gain = ctx.createGain();
  filter = ctx.createBiquadFilter();

  osc.type = "sawtooth"; // aggressive engine tone
  filter.type = "lowpass";

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  gain.gain.value = 0;

  osc.start();
}

// SOUND UPDATE
function updateSound() {
  if (!ctx) return;

  let t = rpm / maxRPM;

  // Engine pitch
  let freq = 50 + t * 300 + gear * 20;
  osc.frequency.setTargetAtTime(freq, ctx.currentTime, 0.1);

  // Volume (throttle)
  let volume = throttle ? 0.3 + t * 0.4 : 0.1;
  gain.gain.setTargetAtTime(volume, ctx.currentTime, 0.1);

  // Filter (makes it sound deeper at low RPM)
  filter.frequency.setTargetAtTime(500 + t * 3000, ctx.currentTime, 0.1);
}

// GAME LOOP
function update() {
  if (gear === 0) {
    rpm += throttle ? 300 : -200;
    speed *= 0.98;
  } else {
    if (throttle) speed += gearRatios[gear] * 0.6;
    else speed -= 0.4;

    rpm = speed * gearRatios[gear] * 90;
  }

  // Rev limiter bounce
  if (rpm > maxRPM) {
    rpm = maxRPM - Math.random() * 400;
  }

  if (rpm < 800) rpm = 800;
  if (speed < 0) speed = 0;

  updateSound();

  document.getElementById("rpmFill").style.width = (rpm/maxRPM*100)+"%";
  document.getElementById("rpmText").innerText = Math.floor(rpm);
  document.getElementById("speedText").innerText = Math.floor(speed);
  document.getElementById("gearText").innerText = gear===0?"N":gear;

  requestAnimationFrame(update);
}

update();

// CONTROLS
document.addEventListener("keydown", e => {
  startAudio();

  if (e.code === "Space") throttle = true;
  if (e.key === "e" && gear < 6) gear++;
  if (e.key === "q" && gear > 0) gear--;
  if (e.key === "n") gear = 0;
});

document.addEventListener("keyup", e => {
  if (e.code === "Space") throttle = false;
});
</script>

</body>
</html>
