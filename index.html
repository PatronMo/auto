<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GTR Simulator PRO</title>
<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

.bar {
  width: 300px;
  height: 20px;
  border: 2px solid white;
  margin: 10px auto;
}

.fill {
  height: 100%;
  width: 0%;
  background: lime;
}

.gear {
  font-size: 50px;
  color: cyan;
}
</style>
</head>
<body>

<h1>🚗 GTR Simulator PRO</h1>
<p>SPACE throttle | Q down | E up | N neutral</p>

<div class="bar"><div id="rpmFill" class="fill"></div></div>

<div>RPM: <span id="rpmText">0</span></div>
<div>Speed: <span id="speedText">0</span></div>
<div class="gear" id="gearText">N</div>

<!-- SOUND LAYERS -->
<audio id="idle" loop src="sounds/idle.mp3"></audio>
<audio id="low" loop src="sounds/low.mp3"></audio>
<audio id="mid" loop src="sounds/mid.mp3"></audio>
<audio id="high" loop src="sounds/high.mp3"></audio>

<audio id="turbo" src="sounds/turbo.mp3"></audio>
<audio id="blowoff" src="sounds/blowoff.mp3"></audio>

<script>
let rpm = 800;
let speed = 0;
let gear = 0;
let throttle = false;
let started = false;

const maxRPM = 9000;
const gearRatios = [0,2.8,2.0,1.5,1.2,1.0,0.8];

const idle = document.getElementById("idle");
const low = document.getElementById("low");
const mid = document.getElementById("mid");
const high = document.getElementById("high");
const turbo = document.getElementById("turbo");
const blowoff = document.getElementById("blowoff");

function startAudio() {
  if (started) return;
  started = true;

  [idle, low, mid, high].forEach(a => {
    a.volume = 0;
    a.play();
  });
}

// SOUND MIXING SYSTEM
function updateSound() {
  let t = rpm / maxRPM;

  idle.volume = Math.max(0, 1 - t * 3);
  low.volume  = Math.max(0, 1 - Math.abs(t - 0.3) * 4);
  mid.volume  = Math.max(0, 1 - Math.abs(t - 0.6) * 4);
  high.volume = Math.max(0, (t - 0.7) * 3);

  // Turbo effect
  if (throttle && rpm > 3000) {
    turbo.volume = Math.min(1, turbo.volume + 0.05);
    turbo.play();
  } else {
    turbo.volume = 0;
  }
}

// GAME LOOP
function update() {
  if (gear === 0) {
    rpm += throttle ? 300 : -200;
    speed *= 0.98;
  } else {
    if (throttle) speed += gearRatios[gear] * 0.6;
    else speed -= 0.4;

    rpm = speed * gearRatios[gear] * 90;
  }

  // Rev limiter bounce
  if (rpm > maxRPM) {
    rpm = maxRPM - Math.random() * 500;
  }

  if (rpm < 800) rpm = 800;
  if (speed < 0) speed = 0;

  updateSound();

  document.getElementById("rpmFill").style.width = (rpm/maxRPM*100)+"%";
  document.getElementById("rpmText").innerText = Math.floor(rpm);
  document.getElementById("speedText").innerText = Math.floor(speed);
  document.getElementById("gearText").innerText = gear===0?"N":gear;

  requestAnimationFrame(update);
}

update();

// CONTROLS
document.addEventListener("keydown", e => {
  startAudio();

  if (e.code === "Space") throttle = true;

  if (e.key === "e" && gear < 6) {
    gear++;
    blowoff.play();
  }

  if (e.key === "q" && gear > 0) {
    gear--;
    blowoff.play();
  }

  if (e.key === "n") gear = 0;
});

document.addEventListener("keyup", e => {
  if (e.code === "Space") {
    throttle = false;
    blowoff.play();
  }
});
</script>

</body>
</html>
