<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GTR Rev Simulator</title>
<style>
  body {
    background: #0b0b0b;
    color: white;
    font-family: Arial;
    text-align: center;
    padding-top: 40px;
  }

  h1 { color: #00c3ff; }

  .bar {
    width: 300px;
    height: 25px;
    background: #222;
    border: 2px solid white;
    margin: 10px auto;
  }

  .fill {
    height: 100%;
    width: 0%;
    background: lime;
  }

  .gear {
    font-size: 40px;
    margin-top: 10px;
    color: #00c3ff;
  }
</style>
</head>
<body>

<h1>🚗 GTR Rev Simulator</h1>
<p>SPACE = throttle | Q = downshift | E = upshift | N = neutral</p>

<div class="bar"><div id="rpmFill" class="fill"></div></div>
<div class="bar"><div id="speedFill" class="fill"></div></div>

<div>RPM: <span id="rpmText">0</span></div>
<div>Speed: <span id="speedText">0</span> km/h</div>
<div class="gear" id="gearText">N</div>

<!-- Better looping engine sound -->
<audio id="engineSound" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b4f5b.mp3?filename=engine-loop-110624.mp3">
</audio>

<script>
let rpm = 800;
let speed = 0;
let gear = 0;
let throttle = false;

const maxRPM = 9000;
const gearRatios = [0, 2.8, 2.0, 1.5, 1.2, 1.0, 0.8];

const rpmFill = document.getElementById("rpmFill");
const speedFill = document.getElementById("speedFill");
const rpmText = document.getElementById("rpmText");
const speedText = document.getElementById("speedText");
const gearText = document.getElementById("gearText");
const sound = document.getElementById("engineSound");

function update() {
  if (gear === 0) {
    if (throttle) rpm += 250;
    else rpm -= 200;
    speed *= 0.98;
  } else {
    if (throttle) {
      speed += gearRatios[gear] * 0.6;
    } else {
      speed -= 0.4;
    }

    rpm = speed * gearRatios[gear] * 90;
  }

  if (rpm < 800) rpm = 800;
  if (rpm > maxRPM) rpm = maxRPM;
  if (speed < 0) speed = 0;

  // 🎵 SOUND MAGIC HERE
  let pitch = rpm / maxRPM; // 0 → 1
  sound.playbackRate = 0.5 + pitch * 1.5;

  // Slight gear effect (higher gear = deeper sound)
  sound.playbackRate *= (1 - gear * 0.03);

  // UI
  rpmFill.style.width = (rpm / maxRPM) * 100 + "%";
  speedFill.style.width = Math.min(speed, 200) / 2 + "%";

  rpmText.innerText = Math.floor(rpm);
  speedText.innerText = Math.floor(speed);
  gearText.innerText = gear === 0 ? "N" : gear;

  // Color
  if (rpm < 4000) rpmFill.style.background = "lime";
  else if (rpm < 7000) rpmFill.style.background = "orange";
  else rpmFill.style.background = "red";

  requestAnimationFrame(update);
}

update();

// Controls
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    throttle = true;
    sound.play();
  }

  if (e.key.toLowerCase() === "e" && gear < 6) gear++;
  if (e.key.toLowerCase() === "q" && gear > 0) gear--;
  if (e.key.toLowerCase() === "n") gear = 0;
});

document.addEventListener("keyup", (e) => {
  if (e.code === "Space") {
    throttle = false;
  }
});
</script>

</body>
</html>
</html>
